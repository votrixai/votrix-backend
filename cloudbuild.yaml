steps:
  # Build the image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"
      - .

  # Push both tags
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - --all-tags
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: bash
    args:
      - -c
      - |
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
        echo "Waiting for image to be available in Artifact Registry..."
        for i in $(seq 1 10); do
          gcloud artifacts docker images describe "$$IMAGE" --quiet > /dev/null 2>&1 && break
          echo "Attempt $$i: image not ready yet, retrying in 10s..."
          sleep 10
        done
        sed "s|IMAGE_URL|$$IMAGE|" "${_SERVICE_CONFIG}" | \
          gcloud run services replace --region="${_REGION}" /dev/stdin

substitutions:
  _SERVICE_NAME: votrix-backend
  _SERVICE_CONFIG: service.production.yaml
  _REPO: votrix
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"
