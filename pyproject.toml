[project]
name = "votrix-backend"
version = "0.1.0"
description = "Votrix AI backend — chat stream + agent prompt filesystem"
requires-python = ">=3.11"
dependencies = [
    # Web framework
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    # Database (SQLAlchemy async + Postgres)
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "alembic>=1.13",
    # LangChain + LangGraph
    "langchain-core>=0.3",
    "langchain-google-genai>=2.0",
    "langchain-openai>=0.2",
    "langgraph>=0.2",
    # Settings
    "pydantic-settings>=2.0",
    # YAML parsing (skill frontmatter)
    "pyyaml>=6.0",
    # HTTP client (fetch handler)
    "httpx>=0.27",
    # API docs
    "scalar-fastapi>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.pytest.ini_options]
asyncio_mode = "auto"
